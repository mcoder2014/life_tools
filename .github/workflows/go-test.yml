name: Go Test Reminder

on:
  pull_request:
    paths:
      - '.github/workflows/go-test.yml'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/go-test.yml'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'

permissions:
  contents: read

jobs:
  go-test:
    name: Go test reminder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache: true

      - name: Run Go tests
        id: go-test
        continue-on-error: true
        run: go test ./...

      - name: Write reminder summary
        if: steps.go-test.outcome == 'failure'
        run: |
          echo '## Go test reminder' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '`go test ./...` failed. This workflow is advisory and does not block release packaging.' >> "$GITHUB_STEP_SUMMARY"
